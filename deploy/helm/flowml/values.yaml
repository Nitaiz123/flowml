# FlowML Helm Chart — Default Values
# Override with: helm install flowml ./deploy/helm/flowml -f my-values.yaml

replicaCount: 3

image:
  repository: docker.io/your-org/flowml-model
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  metricsPort: 9090

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: flowml.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: flowml-tls
      hosts:
        - flowml.example.com

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "2"
    memory: "4Gi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Deployment strategy: rolling | canary | blue-green
deploymentStrategy:
  type: rolling
  canary:
    weight: 10        # % of traffic to canary
    steps: 5          # number of canary steps
  blueGreen:
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 30

observability:
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      interval: 15s
  grafana:
    enabled: true
    dashboards:
      enabled: true
  driftDetection:
    enabled: true
    method: evidently
    threshold: 0.1
    schedule: "0 * * * *"   # hourly

model:
  name: "flowml-model"
  version: "1.0.0"
  batchSize: 32
  maxConcurrentRequests: 100

storage:
  enabled: true
  size: 10Gi
  storageClass: "standard"

redis:
  enabled: true
  host: "redis"
  port: 6379

minio:
  enabled: true
  endpoint: "minio:9000"
  bucket: "flowml-artifacts"

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"
