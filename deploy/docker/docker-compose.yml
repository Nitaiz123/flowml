# FlowML — Docker Compose (Local Development + Observability Stack)
# Usage: docker-compose up -d

version: "3.9"

services:
  # ── Model Server ─────────────────────────────────────────────────────────────
  model-server:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: flowml-model:latest
    container_name: flowml-model-server
    ports:
      - "8080:8080"   # Prediction API
      - "9090:9090"   # Prometheus metrics
    environment:
      - MODEL_NAME=flowml-model
      - LOG_LEVEL=info
      - METRICS_PORT=9090
    volumes:
      - model-storage:/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - flowml-net

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: flowml-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - flowml-net

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: flowml-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=flowml-admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/flowml.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - flowml-net

  # ── Redis (artifact cache) ───────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: flowml-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - flowml-net

  # ── MinIO (artifact store — S3-compatible) ───────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-09-30T07-02-29Z
    container_name: flowml-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=flowml
      - MINIO_ROOT_PASSWORD=flowml-secret
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - flowml-net

volumes:
  model-storage:
  prometheus-data:
  grafana-data:
  redis-data:
  minio-data:

networks:
  flowml-net:
    driver: bridge
